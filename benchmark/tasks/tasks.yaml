- id: impossible-constraint-solver
  tier: impossible
  name: SAT/CSP Constraint Solver
  prompt: |
    Build a SAT solver implementing DPLL with conflict-driven clause learning (CDCL)
    and apply it to solve constraint satisfaction problems.

    Create two files:

    1. solver.py — CDCL SAT solver:
       - class `CDCLSolver`:
         - `solve(clauses: list[list[int]]) -> dict[int, bool] | None`
           — Takes CNF formula as list of clauses (each clause is a list of signed integers,
             positive = true, negative = negated). Returns satisfying assignment or None if UNSAT.
         - **DPLL with CDCL**:
           a) **Unit propagation**: If a clause has one unassigned literal, assign it
           b) **Pure literal elimination**: If a variable appears with only one polarity, assign it
           c) **VSIDS branching heuristic**: Score variables by recent conflict involvement,
              decay scores periodically, pick highest-scored unassigned variable
           d) **Conflict analysis**: On conflict, analyze implication graph to find the
              first UIP (Unique Implication Point) and learn a conflict clause
           e) **Non-chronological backtracking**: Backtrack to the second-highest decision
              level in the learned clause (not just one level up)
