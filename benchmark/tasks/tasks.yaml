- id: nightmare-distributed-kv
  tier: nightmare
  name: Distributed Key-Value Store
  prompt: |
    Build a simulated distributed key-value store with consistent hashing, replication,
    quorum reads/writes, and anti-entropy — all in-memory, single-process simulation.

    Create these files:

    1. consistent_hash.py — Consistent hashing ring:
       - class `HashRing`:
         - `add_node(node_id: str, virtual_nodes: int = 150)` — adds a node with virtual nodes
         - `remove_node(node_id: str)` — removes a node and its virtual nodes
         - `get_node(key: str) -> str` — returns the node responsible for a key
         - `get_nodes(key: str, count: int) -> list[str]` — returns N nodes for replication (preference list)
         - Uses SHA-256 hashing, handles wrap-around on the ring
         - Rebalancing: when nodes are added/removed, only affected key ranges move

    2. kv_store.py — Distributed KV store simulation:
       - class `KVNode`:
         - Local storage: dict of key → `VersionedValue(value, vector_clock, timestamp)`
         - `put(key, value, vector_clock=None) -> VersionedValue`
         - `get(key) -> VersionedValue | None`
         - `delete(key, vector_clock) -> bool`
         - Handles vector clock merging for conflict resolution
       - class `Cluster`:
         - Manages N nodes (default 5) with consistent hash ring
         - `replication_factor = 3` — each key stored on 3 nodes
         - `read_quorum = 2`, `write_quorum = 2` (configurable)
         - `put(key, value)` — writes to W nodes, returns success if quorum met
         - `get(key)` — reads from R nodes, returns latest value by vector clock
         - `delete(key)` — tombstone-based deletion with quorum
         - Simulated network: dict of node_id → KVNode (no actual networking)
         - `partition(node_ids: list[str])` — simulates network partition (isolated nodes can't communicate)
         - `heal_partition()` — restores connectivity
         - Anti-entropy: `sync_nodes(node_a, node_b)` — Merkle tree comparison + exchange of missing/outdated keys
       - class `VectorClock`:
         - `increment(node_id)`, `merge(other)`, `compare(other)` → "before", "after", "concurrent", "equal"
         - Correct partial ordering

    3. membership.py — Gossip protocol:
       - class `GossipProtocol`:
         - Each node maintains a membership list with heartbeat counters
         - `gossip_round()` — each node picks a random peer and exchanges membership state
         - `detect_failures(timeout: int)` — marks nodes as suspected/failed after timeout
         - `join(node_id)` / `leave(node_id)` — voluntary join/leave
         - Convergence: after enough rounds, all nodes agree on membership

    4. test_kv.py — Comprehensive tests (at least 20):
       - HashRing: keys distribute across nodes, adding node rebalances correctly
       - HashRing: virtual nodes improve distribution uniformity
       - HashRing: get_nodes returns correct replication set (no duplicates)
       - KVNode: basic put/get
       - VectorClock: increment, merge, compare (all cases)
       - Cluster: put + get returns correct value
       - Cluster: value replicates to 3 nodes
       - Cluster: read quorum reads from 2 nodes
       - Cluster: write with node down still succeeds (if quorum met)
       - Cluster: write fails if too many nodes down (quorum not met)
       - Cluster: network partition isolates nodes
       - Cluster: after heal, anti-entropy syncs data
       - Cluster: concurrent writes to same key detected via vector clock
       - Cluster: delete with tombstone
       - Cluster: tombstone propagates via anti-entropy
       - Gossip: membership converges after enough rounds
       - Gossip: failure detection marks unresponsive node
       - Gossip: node rejoin after failure
       - Cluster: 100 random puts/gets maintain consistency
       - Cluster: rebalance after node addition moves only affected keys

    Run tests with: python3 -m pytest test_kv.py -v
  evaluation:
