    2. templates/dashboard.html - A responsive dashboard (Jinja2 template) with:
       - Sidebar with category and source filters (clickable to filter)
       - Main content area showing article cards in a grid
       - Search bar at the top that filters articles as you type
       - Each article card shows: title, summary (truncated), source badge, category tag, date
       - Stats section showing article counts

    3. static/dashboard.css - Styling with:
       - CSS Grid layout for the dashboard
       - Card styling with hover effects
       - Color-coded source badges and category tags
