# AI Agent Benchmark Task Definitions
# Each task defines a prompt for the agent and evaluation criteria.

# ─── Easy Tier (2 min timeout) ───────────────────────────────────────────────

- id: easy-fizzbuzz
  tier: easy
  name: FizzBuzz Implementation
  prompt: |
    Create a file called fizzbuzz.py that prints numbers from 1 to 100, one per line.
    For multiples of 3, print "Fizz" instead of the number.
    For multiples of 5, print "Buzz" instead of the number.
    For multiples of both 3 and 5, print "FizzBuzz" instead of the number.
    The program should run with: python3 fizzbuzz.py
  evaluation:
    - type: file_exists
      path: fizzbuzz.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"fizzbuzz.py\", doraise=True)'"
    - type: output_line_count
      command: "python3 fizzbuzz.py"
      expected: 100
    - type: output_contains
      command: "python3 fizzbuzz.py"
      expected:
        - "FizzBuzz"
        - "Fizz"
        - "Buzz"

- id: easy-fibonacci
  tier: easy
  name: Fibonacci Function
  prompt: |
    Create a file called fibonacci.py that contains:
    1. A function fibonacci(n) that returns the nth Fibonacci number (0-indexed, so fibonacci(0)=0, fibonacci(1)=1, fibonacci(10)=55).
    2. When run directly, it should print the first 20 Fibonacci numbers, one per line.
    The program should run with: python3 fibonacci.py
  evaluation:
    - type: file_exists
      path: fibonacci.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"fibonacci.py\", doraise=True)'"
    - type: output_contains
      command: "python3 -c 'from fibonacci import fibonacci; print(fibonacci(10))'"
      expected:
        - "55"
    - type: output_line_count
      command: "python3 fibonacci.py"
      expected: 20

- id: easy-json-extractor
  tier: easy
  name: JSON Data Extractor
  prompt: |
    Create two files:
    1. data.json - A JSON file containing an array of objects, each with "name" (string) and "age" (integer) fields.
       Include at least 5 people with varied names and ages.
    2. extract.py - A Python script that reads data.json, extracts all names, sorts them alphabetically,
       and prints each name on its own line.
    The program should run with: python3 extract.py
  evaluation:
    - type: file_exists
      path: data.json
    - type: file_exists
      path: extract.py
    - type: syntax_check
      command: "python3 -c 'import json; json.load(open(\"data.json\"))'"
    - type: run_command
      command: "python3 extract.py"
      exit_code: 0

- id: easy-reverse-string
  tier: easy
  name: Reverse String Without Slicing
  prompt: |
    Create a file called reverse.py that contains:
    1. A function reverse_string(s) that reverses a string WITHOUT using Python slice notation (no s[::-1]).
       Use a loop or other approach.
    2. A function test_reverse() that tests reverse_string with at least 4 test cases including:
       empty string, single character, palindrome, and a regular word.
       Each test should use assert statements.
    3. When run directly, it should call test_reverse() and print "All tests passed!" if successful.
    The program should run with: python3 reverse.py
  evaluation:
    - type: file_exists
      path: reverse.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"reverse.py\", doraise=True)'"
    - type: output_contains
      command: "python3 reverse.py"
      expected:
        - "All tests passed"
    - type: output_contains
      command: "python3 -c 'from reverse import reverse_string; print(reverse_string(\"hello\"))'"
      expected:
        - "olleh"

# ─── Medium Tier (5 min timeout) ─────────────────────────────────────────────

- id: medium-tictactoe
  tier: medium
  name: Tic-Tac-Toe with AI
  prompt: |
    Create two files:
    1. tictactoe.py - A Tic-Tac-Toe game engine with:
       - A TicTacToe class with methods: make_move(row, col), get_winner(), is_full(), reset()
       - The board is 3x3, players are 'X' and 'O', X goes first
       - get_winner() returns 'X', 'O', or None
       - An ai_move(board) function that returns (row, col) for a reasonable AI move
    2. test_tictactoe.py - Tests using unittest with at least 6 test cases covering:
       - Valid moves, invalid moves (occupied cell), win detection (row/col/diagonal),
         draw detection, board reset, AI move validity
    Run tests with: python3 -m pytest test_tictactoe.py -v
  evaluation:
    - type: file_exists
      path: tictactoe.py
    - type: file_exists
      path: test_tictactoe.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"tictactoe.py\", doraise=True)'"
    - type: run_command
      command: "python3 -m pytest test_tictactoe.py -v"
      exit_code: 0

- id: medium-rest-api
  tier: medium
  name: REST API with Flask
  prompt: |
    Create two files:
    1. app.py - A Flask REST API for managing a todo list with these endpoints:
       - GET /todos - List all todos (JSON array)
       - POST /todos - Create a todo (JSON body with "title", optional "done" boolean, defaults false)
       - GET /todos/<id> - Get a single todo by ID
       - PUT /todos/<id> - Update a todo (JSON body with "title" and/or "done")
       - DELETE /todos/<id> - Delete a todo
       Use an in-memory list/dict for storage. Each todo has: id (int), title (str), done (bool).
       Return appropriate HTTP status codes (200, 201, 404).
    2. test_app.py - Tests using the Flask test client with at least 5 test cases covering:
       - Create a todo, list todos, get single todo, update todo, delete todo, 404 for missing todo
    Run tests with: python3 -m pytest test_app.py -v
  evaluation:
    - type: file_exists
      path: app.py
    - type: file_exists
      path: test_app.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"app.py\", doraise=True)'"
    - type: run_command
      command: "python3 -m pytest test_app.py -v"
      exit_code: 0

- id: medium-cli-search
  tier: medium
  name: CLI Search Tool
  prompt: |
    Create two files:
    1. search.py - A command-line recursive text search tool (like a simple grep -r) using argparse:
       - Usage: python3 search.py <pattern> <directory>
       - Recursively searches all .txt and .py files in the directory
       - Prints matching lines in format: "filename:line_number:line_content"
       - Supports --ignore-case / -i flag for case-insensitive search
       - Supports --count / -c flag to only print the total count of matches
       - Handles missing directory gracefully with an error message
    2. test_search.py - Tests that create a temporary directory with test files and verify:
       - Basic search finds correct matches
       - Case-insensitive search works
       - Count mode returns correct number
       - Missing directory shows error
       Run with: python3 -m pytest test_search.py -v
  evaluation:
    - type: file_exists
      path: search.py
    - type: file_exists
      path: test_search.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"search.py\", doraise=True)'"
    - type: run_command
      command: "python3 -m pytest test_search.py -v"
      exit_code: 0

- id: medium-csv-pipeline
  tier: medium
  name: CSV Data Pipeline
  prompt: |
    Create two files:
    1. pipeline.py - A data processing pipeline that:
       - Has a generate_data() function that creates sales_data.csv with 100 rows containing:
         date (random dates in 2024), product (from: Widget, Gadget, Doohickey, Thingamajig),
         quantity (1-50), unit_price (5.00-100.00 rounded to 2 decimals)
       - Has an analyze_data() function that reads sales_data.csv and produces summary.json containing:
         total_revenue, average_order_value, top_product (by total revenue),
         monthly_totals (dict of YYYY-MM to revenue)
       - When run directly, calls generate_data() then analyze_data() and prints "Pipeline complete"
    2. test_pipeline.py - Tests covering:
       - generate_data creates a valid CSV with correct columns and 100 rows
       - analyze_data produces valid JSON with all required keys
       - total_revenue is a positive number
       - top_product is one of the valid product names
       Run with: python3 -m pytest test_pipeline.py -v
  evaluation:
    - type: file_exists
      path: pipeline.py
    - type: file_exists
      path: test_pipeline.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"pipeline.py\", doraise=True)'"
    - type: output_contains
      command: "python3 pipeline.py"
      expected:
        - "Pipeline complete"
    - type: run_command
      command: "python3 -m pytest test_pipeline.py -v"
      exit_code: 0

# ─── Hard Tier (15 min timeout) ──────────────────────────────────────────────

- id: hard-portfolio
  tier: hard
  name: Full-Stack Portfolio Site
  prompt: |
    Create a full-stack personal portfolio website with these files:

    1. server.py - A Flask web server that:
       - Serves static files (HTML/CSS/JS) from a "static" directory
       - Has a GET /api/projects endpoint returning a JSON array of at least 3 projects,
         each with: id, title, description, technologies (list of strings), url
       - Has a GET /api/about endpoint returning JSON with: name, bio, skills (list), contact_email
       - Runs on port 5000

    2. static/index.html - A responsive portfolio page with:
       - Navigation bar with links to sections: About, Projects, Contact
       - Hero section with name and tagline
       - Projects section that fetches from /api/projects and renders project cards
       - About section that fetches from /api/about
       - Footer with copyright

    3. static/style.css - Styling with:
       - Responsive layout (flexbox or grid)
       - Professional color scheme
       - Mobile-friendly (media queries for < 768px)

    4. static/app.js - Frontend JavaScript that:
       - Fetches project data from /api/projects on page load
       - Dynamically creates project cards in the DOM
       - Fetches about data from /api/about and populates the about section

    5. test_server.py - Tests verifying:
       - /api/projects returns a list with at least 3 items
       - Each project has required fields
       - /api/about returns valid data with required fields
       - Static index.html is served at /
       Run with: python3 -m pytest test_server.py -v
  evaluation:
    - type: file_exists
      path: server.py
    - type: file_exists
      path: static/index.html
    - type: file_exists
      path: static/style.css
    - type: file_exists
      path: static/app.js
    - type: file_exists
      path: test_server.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"server.py\", doraise=True)'"
    - type: run_command
      command: "python3 -m pytest test_server.py -v"
      exit_code: 0
    - type: server_check
      start_command: "python3 server.py"
      port: 5000
      startup_wait: 3
      checks:
        - url: "http://localhost:5000/"
          status: 200
          contains: "<!DOCTYPE html>"
        - url: "http://localhost:5000/api/projects"
          status: 200
          contains: "title"
        - url: "http://localhost:5000/api/about"
          status: 200
          contains: "name"

- id: hard-news-aggregator
  tier: hard
  name: News Aggregator Dashboard
  prompt: |
    Create a news aggregator web application with mock data:

    1. app.py - Flask application with:
       - A MockNewsSource class that generates realistic mock news articles with:
         id, title, summary, source (from: TechCrunch, BBC, Reuters, HackerNews),
         category (from: technology, business, science, world), published_date, url
       - Generate at least 30 mock articles on startup
       - GET / serves the dashboard HTML
       - GET /api/articles returns all articles as JSON (supports ?category= and ?source= query params for filtering)
       - GET /api/articles/search?q=<term> searches titles and summaries
       - GET /api/stats returns JSON with article count per source and per category
