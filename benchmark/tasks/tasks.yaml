      start_command: "python3 app.py"
      port: 5000
      startup_wait: 3
      checks:
        - url: "http://localhost:5000/"
          status: 200
          contains: "<!DOCTYPE html>"
        - url: "http://localhost:5000/api/articles"
          status: 200
          contains: "title"
        - url: "http://localhost:5000/api/stats"
          status: 200
          contains: "source"

- id: hard-chess-engine
  tier: hard
  name: Chess Engine
  prompt: |
    Implement a chess engine in Python with full rules enforcement:

    1. chess_engine.py - Core engine with:
       - Board class that represents an 8x8 chess board
       - Standard starting position initialization
       - Piece representation (King, Queen, Rook, Bishop, Knight, Pawn) for both colors
       - Legal move generation for ALL piece types including:
         - Sliding pieces (Rook, Bishop, Queen) with blocking
         - Knight L-shaped moves
         - Pawn single/double advance, diagonal captures, en passant
         - King moves including castling (kingside and queenside)
         - Pawn promotion (auto-promote to Queen)
       - Move validation: a move is legal only if it doesn't leave own king in check
       - Check detection: board.is_checkmate() returns True if current player's king is in check and no legal moves
       - Stalemate detection: board.is_stalemate() returns True if current player is NOT in check and has no legal moves
       - Move execution via board.make_move(notation) using algebraic notation (e.g., "e2e4", "g1f3", "e1g1" for castling). Returns True if legal, raises ValueError if illegal.
       - FEN string export of current position
       - FEN string import via Board.from_fen(fen_string) class method to set up arbitrary positions
       - Move history tracking
       - Turn management (white/black alternating)

    2. test_chess.py - Comprehensive tests covering:
       - Initial board setup is correct (all 32 pieces in right positions)
       - Pawn moves: single advance, double advance from starting rank, diagonal capture
       - Knight moves: L-shape, can jump over pieces
       - Bishop moves: diagonal sliding, blocked by pieces
       - Rook moves: horizontal/vertical sliding, blocked by pieces
       - Queen moves: combines rook + bishop movement
       - King moves: one square any direction
       - Castling: kingside and queenside, blocked by pieces between, cannot castle through check, cannot castle after king/rook has moved
       - En passant capture
       - Pawn promotion to queen on reaching 8th rank
       - Check detection: test a known check position
       - Checkmate detection: Scholar's mate (1. e2e4 e7e5 2. f1c4 b8c6 3. d1h5 g8f6 4. h5f7 = checkmate)
       - Stalemate detection: test a known stalemate position
       - Illegal move rejection: cannot move into check, cannot ignore check, cannot move opponent's pieces
       - Turn enforcement: white moves first, then alternating
       Run with: python3 -m pytest test_chess.py -v --timeout=60

    3. play_chess.py - Simple CLI interface that:
       - Displays the board using Unicode chess symbols (♔♕♖♗♘♙ / ♚♛♜♝♞♟)
       - Shows whose turn it is
       - Accepts moves in algebraic notation (e.g., "e2e4")
       - Validates and executes moves
       - Announces check, checkmate, or stalemate
       - Supports "quit" command to exit
       - Supports "fen" command to print current FEN
       - Supports "moves" command to list legal moves for current player

    IMPORTANT — Required API contract (the Board class MUST implement these exact methods):
       - board.legal_moves_algebraic() -> list[str]: Returns legal moves as coordinate strings
         e.g., ["e2e4", "g1f3", "e1g1"]. Each move is 4 chars (from_square + to_square)
         with optional 5th char for promotion piece (e.g., "a7a8q"). MUST return list of str.
       - board.make_move(move_str) -> True/raises ValueError: Takes a coordinate string.
       - board.to_fen() -> str: Standard FEN with ALL 6 fields:
         <pieces> <turn> <castling> <en_passant> <halfmove_clock> <fullmove_number>
         The halfmove clock MUST increment on non-pawn, non-capture moves and reset on
         pawn moves and captures (this is critical for the 50-move rule).
       - Board.from_fen(fen_str) -> Board: Class method. Must restore ALL state including
         castling rights, en passant, halfmove clock, and fullmove number.
       - board.is_checkmate() -> bool
       - board.is_stalemate() -> bool
       - board.is_in_check(color) -> bool: where color is "white" or "black" (or board.turn)

    Focus on correctness over optimization. All chess rules must be properly enforced.
  evaluation:
    - type: file_exists
      path: chess_engine.py
    - type: file_exists
      path: test_chess.py
    - type: file_exists
      path: play_chess.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"chess_engine.py\", doraise=True)'"
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"play_chess.py\", doraise=True)'"
    - type: run_command
      command: "python3 -m pytest test_chess.py -v --timeout=60"
      exit_code: 0
      timeout: 120
    - type: run_command
      command: |
        python3 -c "
        from chess_engine import Board
        b = Board()
        # Scholar's mate
        for mv in ['e2e4','e7e5','f1c4','b8c6','d1h5','g8f6','h5f7']:
            assert b.make_move(mv), f'Move {mv} should be legal'
        assert b.is_checkmate(), 'Should be checkmate after Scholar s mate'
        print('Scholar mate: PASS')
        # Stalemate test: black king on a8, white queen b6 + king c6 = stalemate for black
        b2 = Board.from_fen('k7/8/1QK5/8/8/8/8/8 b - - 0 1')
        assert b2.is_stalemate(), 'Should be stalemate'
        print('Stalemate: PASS')
        print('ALL VERIFICATION PASSED')
        "
      exit_code: 0
      timeout: 30
    - type: run_command
      command: |
        python3 -c "
        from chess_engine import Board
        # Test API contract: legal_moves_algebraic returns list of strings
        b = Board()
        moves = b.legal_moves_algebraic()
        assert isinstance(moves, list), f'legal_moves_algebraic must return list, got {type(moves)}'
        assert len(moves) == 20, f'Initial position should have 20 legal moves, got {len(moves)}'
        for m in moves:
            assert isinstance(m, str), f'Each move must be a string, got {type(m)}: {m}'
            assert len(m) >= 4, f'Move must be at least 4 chars, got: {m}'
        print(f'legal_moves_algebraic: PASS ({len(moves)} moves, all strings)')

        # Test FEN has all 6 fields and halfmove clock works
        b.make_move('e2e4')
        fen1 = b.to_fen()
        parts = fen1.split()
        assert len(parts) == 6, f'FEN must have 6 fields, got {len(parts)}: {fen1}'
        assert parts[4] == '0', f'Halfmove clock should be 0 after pawn move, got {parts[4]}'
        b.make_move('e7e5')
        b.make_move('g1f3')  # non-pawn, non-capture
        fen2 = b.to_fen()
        parts2 = fen2.split()
        assert parts2[4] == '1', f'Halfmove clock should be 1 after Nf3, got {parts2[4]}'
        print(f'FEN halfmove clock: PASS')

        # Test from_fen roundtrip
        b3 = Board.from_fen(fen2)
        assert b3.to_fen() == fen2, f'FEN roundtrip failed: {b3.to_fen()} != {fen2}'
        print(f'FEN roundtrip: PASS')
        print('API CONTRACT PASSED')
        "
      exit_code: 0
      timeout: 30

# ─── Extreme Tier (20 min timeout) ────────────────────────────────────────────

- id: extreme-regex-engine
  tier: extreme
  name: Regex Engine from Scratch
  prompt: |
    Build a regex engine from scratch in Python. Do NOT use the `re` module or any regex library.

    Create two files:

    1. regex_engine.py — A module with:
       - A `match(pattern, text)` function that returns True if the pattern matches the ENTIRE text
       - A `search(pattern, text)` function that returns the first Match object (with .group(), .start(), .end()) or None
       - Supported syntax:
         - Literal characters
         - `.` matches any single character
         - `*` zero or more of the preceding element
         - `+` one or more of the preceding element
         - `?` zero or one of the preceding element
         - `|` alternation (e.g., `cat|dog`)
         - `()` grouping (e.g., `(ab)+` matches "abab")
         - `[a-z]` character classes with ranges (e.g., `[A-Za-z0-9]`)
         - `[^...]` negated character classes
         - `\d` digit, `\w` word character, `\s` whitespace
         - `^` start anchor, `$` end anchor
       - Implementation approach: parse the regex into an NFA or use recursive descent.

    2. test_regex.py — At least 20 test cases using pytest, covering:
       - Literal matching: `match("hello", "hello")` is True
       - Dot: `match("h.llo", "hello")` is True
       - Star: `match("ab*c", "ac")` and `match("ab*c", "abbc")` are True
       - Plus: `match("ab+c", "abc")` is True, `match("ab+c", "ac")` is False
       - Question: `match("colou?r", "color")` and `match("colou?r", "colour")` both True
       - Alternation: `match("cat|dog", "cat")` and `match("cat|dog", "dog")` True
       - Grouping: `match("(ab)+", "abab")` True, `match("(ab)+", "aba")` False
       - Character classes: `match("[a-z]+", "hello")` True, `match("[a-z]+", "Hello")` False
       - Negated classes: `match("[^0-9]+", "hello")` True
       - Shortcuts: `match("\\d+", "123")` True, `match("\\w+", "hello_123")` True
       - Anchors: `search("^hello", "hello world")` finds "hello", `search("world$", "hello world")` finds "world"
       - Complex: `match("(a|b)*c", "aababc")` True
       - Edge cases: empty pattern, empty text, nested groups

    Run tests with: python3 -m pytest test_regex.py -v
  evaluation:
    - type: file_exists
      path: regex_engine.py
    - type: file_exists
      path: test_regex.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"regex_engine.py\", doraise=True)'"
    - type: run_command
      command: "python3 -c 'from regex_engine import match, search; assert match(\"hello\", \"hello\"); assert not match(\"hello\", \"world\"); print(\"basic ok\")'"
      exit_code: 0
    - type: run_command
      command: "python3 -c 'from regex_engine import match; assert match(\"ab*c\", \"ac\"); assert match(\"ab*c\", \"abbc\"); assert match(\"a.c\", \"axc\"); print(\"quantifiers ok\")'"
      exit_code: 0
    - type: run_command
      command: "python3 -c 'from regex_engine import match; assert match(\"(ab)+\", \"abab\"); assert match(\"cat|dog\", \"dog\"); assert match(\"[a-z]+\", \"hello\"); print(\"advanced ok\")'"
      exit_code: 0
    - type: run_command
      command: "python3 -m pytest test_regex.py -v"
      exit_code: 0

- id: extreme-orm-query-builder
  tier: extreme
  name: SQL Query Builder (Mini ORM)
  prompt: |
    Build a SQL query builder with a fluent (method-chaining) API in Python.

    Create two files:

    1. query_builder.py — A module with a `Query` class supporting:
       - `Query("users")` — sets the table
       - `.select("name", "email")` — columns to select (default: *)
       - `.where("age > ?", 25)` — WHERE clause with parameterized values (can chain multiple, ANDed)
       - `.or_where("status = ?", "active")` — OR conditions
       - `.join("orders", "users.id = orders.user_id")` — INNER JOIN
       - `.left_join("profiles", "users.id = profiles.user_id")` — LEFT JOIN
       - `.group_by("category")` — GROUP BY clause
