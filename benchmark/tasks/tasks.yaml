- id: impossible-compiler-optimizer
  tier: impossible
  name: Python Bytecode Optimizer
  prompt: |
    Build a Python bytecode optimizer that takes a function, disassembles its bytecode,
    applies peephole optimizations, reassembles it, and verifies correctness.

    Create two files:

    1. optimizer.py — A bytecode optimization module with:
       - class `BytecodeOptimizer`:
         - `optimize(func) -> func` — takes a Python function, returns an optimized version
         - Optimizations to implement:
           a) **Constant folding**: Evaluate constant expressions at compile time
              (e.g., `x = 2 * 3 * 7` → `x = 42`, `s = "hello" + " " + "world"` → `s = "hello world"`)
           b) **Dead code elimination**: Remove code after unconditional return/raise
           c) **Strength reduction**: Replace expensive ops with cheaper ones
              (e.g., `x * 2` → `x + x`, `x ** 2` → `x * x`, `x * 1` → `x`, `x + 0` → `x`)
           d) **Jump threading**: Optimize chains of jumps (jump to jump → direct jump)
         - `get_stats() -> dict` — returns counts of each optimization applied
         - Must handle: nested functions, closures, generators, default arguments
         - The optimized function MUST produce identical results to the original for all inputs
       - Uses the `dis`, `types`, and `opcode` modules from the standard library
       - class `BytecodeVerifier`:
         - `verify(original, optimized, test_inputs: list[tuple]) -> bool`
         - Runs both functions with all test_inputs and verifies identical outputs
         - Also checks: same exceptions raised, same side effects (via mock)

    2. test_optimizer.py — At least 20 test cases with pytest:
       - Constant folding: arithmetic expressions simplified
       - Constant folding: string concatenation folded
       - Dead code after return is removed
       - Dead code after raise is removed
       - Strength reduction: multiply by 2 → add
       - Strength reduction: power of 2 → multiply
       - Identity operations removed (x*1, x+0)
       - Jump threading reduces instruction count
       - Optimized function returns same results as original (10+ test functions)
       - Closures still work after optimization
       - Default arguments preserved
       - Generator functions still yield correctly
       - Recursive functions work after optimization
       - Exception handling blocks preserved
       - Verifier catches incorrect optimization (negative test)
       - Stats correctly count optimizations applied
       - Complex function with multiple optimization opportunities
       - Optimization is idempotent (optimizing twice gives same result)
       - Functions with decorators work
       - Empty function optimization doesn't crash

    Run tests with: python3 -m pytest test_optimizer.py -v
  evaluation:
    - type: file_exists
      path: optimizer.py
    - type: file_exists
      path: test_optimizer.py
    - type: syntax_check
      command: "python3 -c 'import py_compile; py_compile.compile(\"optimizer.py\", doraise=True)'"
    - type: run_command
      command: "python3 -c \"from optimizer import BytecodeOptimizer; opt = BytecodeOptimizer(); f = opt.optimize(lambda x: x * 2 + 0); print(f(21)); assert f(21) == 42\""
      exit_code: 0
    - type: run_command
      command: "python3 -m pytest test_optimizer.py -v"
      exit_code: 0
      timeout: 60

