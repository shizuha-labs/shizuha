- id: impossible-network-protocol
  tier: impossible
  name: Reliable Transport Protocol
  prompt: |
    Implement a TCP-like reliable transport protocol over a simulated unreliable channel
    that drops 20% of packets, reorders them, and introduces duplicates.

    Create three files:

    1. channel.py — Unreliable network channel simulator:
       - class `UnreliableChannel`:
         - `__init__(loss_rate=0.2, reorder_rate=0.1, duplicate_rate=0.05, delay_range=(0.001, 0.01))`
         - `send(packet: bytes, dest: str)` — simulates sending; may drop, reorder, duplicate, delay
         - `receive(timeout: float = 1.0) -> tuple[bytes, str] | None` — blocking receive
         - Internal: uses threading + queues to simulate async network
         - Configurable: can set loss_rate=0 for testing reliability in ideal conditions
       - class `Packet`:
         - `seq_num: int` — sequence number
         - `ack_num: int` — acknowledgment number
         - `flags: set` — SYN, ACK, FIN, RST
         - `window_size: int` — receive window
         - `data: bytes`
         - `sack_blocks: list[tuple[int, int]]` — selective ACK ranges
         - `checksum: int` — CRC32 checksum
         - `serialize() -> bytes` / `@staticmethod deserialize(data: bytes) -> Packet`
         - Checksum validation to detect corruption

    2. transport.py — Reliable transport protocol:
       - class `ReliableTransport`:
         - **Connection establishment**: 3-way handshake (SYN, SYN-ACK, ACK)
         - `connect(peer: str)` — active open (client)
         - `listen()` / `accept() -> Connection` — passive open (server)
         - **Reliable delivery**:
           - Sliding window protocol with configurable window size
           - Selective ACK (SACK): receiver reports gaps so sender retransmits only lost segments
           - Cumulative ACK: acknowledges all data up to ack_num
           - Retransmission timeout (RTO): adaptive based on RTT estimation (Jacobson/Karels algorithm)
           - Fast retransmit: retransmit on 3 duplicate ACKs without waiting for timeout
         - **Congestion control**:
           - Slow start: cwnd starts at 1 MSS, doubles each RTT until ssthresh
           - Congestion avoidance: linear increase after ssthresh (additive increase)
           - On packet loss (timeout): ssthresh = cwnd/2, cwnd = 1 MSS (multiplicative decrease)
           - On 3 dup ACKs: fast recovery (ssthresh = cwnd/2, cwnd = ssthresh + 3)
         - **Data transfer**:
           - `send(data: bytes)` — segments data into MSS-sized chunks, sends reliably
           - `receive(size: int) -> bytes` — receives data reliably, returns in-order bytes
           - Handles out-of-order delivery using receive buffer
           - Flow control: receiver advertises window size
         - **Connection teardown**: 4-way FIN handshake (FIN, ACK, FIN, ACK)
         - `close()` — graceful shutdown

    3. test_transport.py — At least 20 test cases with pytest:
       - 3-way handshake completes successfully
       - Send and receive small message (< 1 MSS)
       - Send and receive message spanning multiple segments
