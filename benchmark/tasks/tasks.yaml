- id: extreme-debug-marathon
  tier: extreme
  name: Debug Marathon (10 Seeded Bugs)
  prompt: |
    You are given a buggy expression evaluator. Create the file `evaluator.py` with
    EXACTLY the following buggy code (copy it precisely, bugs and all), then create
    a comprehensive test file, find ALL 10 bugs, and fix them.

    Here is the buggy evaluator.py — create this file first:

    ```python
    """Expression evaluator with 10 seeded bugs. Find and fix them all."""
    import operator
    import math

    class Token:
        def __init__(self, type_, value):
            self.type = type_
            self.value = value
        def __repr__(self):
            return f"Token({self.type}, {self.value!r})"

    class Lexer:
        def __init__(self, text):
            self.text = text
            self.pos = 0

        def tokenize(self):
            tokens = []
            while self.pos < len(self.text):
                ch = self.text[self.pos]
                if ch.isspace():
                    self.pos += 1
                elif ch.isdigit() or ch == '.':
                    tokens.append(self._number())
                elif ch.isalpha() or ch == '_':
                    tokens.append(self._identifier())
                elif ch in '+-*/%^':
                    tokens.append(Token('OP', ch))
                    self.pos += 1
                elif ch == '(':
                    tokens.append(Token('LPAREN', ch))
                    self.pos += 1
                elif ch == ')':
                    tokens.append(Token('RPAREN', ch))
                    self.pos += 1
                elif ch == ',':
                    tokens.append(Token('COMMA', ch))
                    self.pos += 1
                # BUG 1: negative numbers not handled (e.g., "-3" as unary minus)
                else:
                    raise SyntaxError(f"Unexpected character: {ch!r} at position {self.pos}")
            tokens.append(Token('EOF', None))
            return tokens

        def _number(self):
            start = self.pos
            has_dot = False
            while self.pos < len(self.text) and (self.text[self.pos].isdigit() or self.text[self.pos] == '.'):
                if self.text[self.pos] == '.':
                    if has_dot:
                        break  # second dot ends the number
                    has_dot = True
                self.pos += 1
            # BUG 2: always returns int, even for floats like "3.14"
            return Token('NUMBER', int(self.text[start:self.pos]))

        def _identifier(self):
            start = self.pos
            while self.pos < len(self.text) and (self.text[self.pos].isalnum() or self.text[self.pos] == '_'):
                self.pos += 1
            return Token('ID', self.text[start:self.pos])

    class Parser:
        """Recursive descent parser for expressions."""
        def __init__(self, tokens):
            self.tokens = tokens
            self.pos = 0

        def parse(self):
            result = self.expression()
            if self.current().type != 'EOF':
                raise SyntaxError(f"Unexpected token: {self.current()}")
            return result

        def current(self):
            return self.tokens[self.pos]

        def eat(self, type_):
            tok = self.current()
            if tok.type != type_:
                raise SyntaxError(f"Expected {type_}, got {tok}")
            self.pos += 1
            return tok

        def expression(self):
            return self.addition()

        def addition(self):
            left = self.multiplication()
            while self.current().type == 'OP' and self.current().value in ('+', '-'):
                op = self.eat('OP').value
                right = self.multiplication()
                if op == '+':
                    left = left + right
                else:
                    # BUG 3: subtraction is reversed (right - left instead of left - right)
                    left = right - left
            return left

        def multiplication(self):
            left = self.power()
            while self.current().type == 'OP' and self.current().value in ('*', '/', '%'):
                op = self.eat('OP').value
                right = self.power()
                if op == '*':
                    left = left * right
                elif op == '/':
                    if right == 0:
                        raise ZeroDivisionError("Division by zero")
                    # BUG 4: integer division used instead of true division
                    left = left // right
                else:
                    left = left % right
            return left

        def power(self):
            base = self.unary()
            # BUG 5: power is left-associative (should be right-associative)
            # e.g., 2^3^2 should be 2^(3^2)=512, not (2^3)^2=64
            while self.current().type == 'OP' and self.current().value == '^':
                self.eat('OP')
                exp = self.unary()
                base = base ** exp
            return base

        def unary(self):
            if self.current().type == 'OP' and self.current().value in ('+', '-'):
                op = self.eat('OP').value
                val = self.unary()
                # BUG 6: unary minus doesn't negate (returns val instead of -val)
                return val if op == '+' else val
            return self.primary()

        def primary(self):
            tok = self.current()
            if tok.type == 'NUMBER':
                self.eat('NUMBER')
                return tok.value
            elif tok.type == 'LPAREN':
                self.eat('LPAREN')
                result = self.expression()
                self.eat('RPAREN')
                return result
            elif tok.type == 'ID':
                name = self.eat('ID').value
                if self.current().type == 'LPAREN':
                    return self.function_call(name)
                return self.variable_lookup(name)
            raise SyntaxError(f"Unexpected token: {tok}")

        def function_call(self, name):
            self.eat('LPAREN')
            args = []
            if self.current().type != 'RPAREN':
                args.append(self.expression())
                while self.current().type == 'COMMA':
                    self.eat('COMMA')
                    args.append(self.expression())
            self.eat('RPAREN')
            return self.call_function(name, args)

        def variable_lookup(self, name):
            constants = {'pi': math.pi, 'e': math.e, 'tau': math.tau}
            if name in constants:
                return constants[name]
            raise NameError(f"Undefined variable: {name}")

        def call_function(self, name, args):
            functions = {
                'abs': (1, abs),
                'sqrt': (1, math.sqrt),
                'sin': (1, math.sin),
                'cos': (1, math.cos),
                'tan': (1, math.tan),
                'log': (1, math.log),  # BUG 7: log should support 1 or 2 args (log(x) and log(x, base))
                'max': (2, max),
                'min': (2, min),
                'pow': (2, pow),
                'round': (1, round),  # BUG 8: round should support 1 or 2 args (round(x) and round(x, ndigits))
            }
            if name not in functions:
                raise NameError(f"Unknown function: {name}")
            expected_args, func = functions[name]
            # BUG 9: strict arg count check prevents variable-arg functions from working
            if len(args) != expected_args:
                raise TypeError(f"{name}() expects {expected_args} args, got {len(args)}")
            return func(*args)


    class Evaluator:
        """Main evaluator class."""
        def __init__(self):
            self.variables = {}

        def evaluate(self, expression):
            """Evaluate a mathematical expression string."""
            if not expression or not expression.strip():
                # BUG 10: returns None instead of raising an error for empty input
                return None
            lexer = Lexer(expression.strip())
            tokens = lexer.tokenize()
            parser = Parser(tokens)
            return parser.parse()

        def set_variable(self, name, value):
            self.variables[name] = value
    ```

    After creating the file with the buggy code above, do the following:

    1. Create `test_evaluator.py` with at least 30 test cases using pytest that cover:
       - Basic arithmetic: addition, subtraction, multiplication, division, modulo
       - Floating point numbers: 3.14, 0.5, etc.
       - Operator precedence: 2 + 3 * 4 = 14, not 20
       - Power operator: 2^10 = 1024, right-associativity (2^3^2 = 512)
       - Unary minus: -5, -(3+2), -(-3)
       - Parentheses: (2 + 3) * 4 = 20
       - Functions: sqrt(16)=4, abs(-5)=5, sin(0)=0, max(3,7)=7
       - Variable-arg functions: log(100, 10) = 2.0, round(3.14159, 2) = 3.14
       - Constants: pi, e, tau
       - Division: 7/2 = 3.5 (NOT 3), 10/3 ≈ 3.333...
       - Nested expressions: sqrt(abs(-16)), max(2^3, 3^2)
       - Empty input: should raise an error, NOT return None
       - Division by zero: should raise ZeroDivisionError
       - Complex: (2 + 3) * -4 = -20, -2^2 = -4 (unary minus has lower precedence than power)
       - Edge cases: very large numbers, very small decimals

    2. Run the tests — they should initially fail on the bugs.

    3. Fix ALL 10 bugs in evaluator.py:
       - Bug 1: Handle negative number literals in lexer (or ensure unary minus works in all positions)
       - Bug 2: Return float when number contains a decimal point
       - Bug 3: Fix subtraction order (left - right, not right - left)
       - Bug 4: Use true division (/) not integer division (//)
       - Bug 5: Make power right-associative
       - Bug 6: Make unary minus actually negate the value
       - Bug 7: Make log() accept 1 or 2 arguments
       - Bug 8: Make round() accept 1 or 2 arguments
       - Bug 9: Fix arg count checking to allow variable-arg functions
       - Bug 10: Raise ValueError for empty input instead of returning None

    4. Run tests again — ALL tests must pass.

    The final evaluator.py must work correctly for all the above cases.
    Run tests with: python3 -m pytest test_evaluator.py -v
  evaluation:
    - type: file_exists
      path: evaluator.py
    - type: file_exists
